<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freebuff AI Premium</title>
    <style>
        :root {
            --bg-dark: #0d0e12;
            --panel-bg: #161820;
            --accent-blue: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #262936;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Header */
        header {
            background-color: var(--panel-bg);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            font-size: 0.75rem;
            background-color: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 4px 8px;
            border-radius: 9999px;
            font-weight: 500;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* Chat Output Space */
        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .response-box {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
            line-height: 1.6;
            font-size: 0.95rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            white-space: pre-wrap;
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 600;
        }

        /* Control Input Area at bottom */
        .input-panel {
            background-color: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        textarea {
            width: 100%;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-main);
            font-size: 0.95rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--accent-blue);
        }

        button {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        button:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <header>
        <h1>Freebuff AI</h1>
        <span class="status-badge">Cloud Connected</span>
    </header>

    <div class="chat-container">
        <div class="section-title">System Response</div>
        <div id="ai-response" class="response-box">Hello! Ask me anything. Your deepseek cloud model is ready to process requests.</div>
    </div>

    <div class="input-panel">
        <textarea id="user-prompt" rows="3" placeholder="Type a smart prompt here..."></textarea>
        <button onclick="handleChatSubmit()">Send to Cloud</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
