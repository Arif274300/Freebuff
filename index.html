<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Freebuff AI Studio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #131314;
            color: #e3e3e3;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        /* Top Navigation bar */
        header {
            background-color: #1e1f20;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #2d2f31;
        }
        header h1 {
            font-size: 18px;
            font-weight: 500;
            color: #e3e3e3;
            letter-spacing: 0.2px;
        }
        header .model-badge {
            background-color: #004a77;
            color: #c2e7ff;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 12px;
            margin-left: 10px;
            font-weight: 600;
        }
        /* Chat View Window */
        #chat-container {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 15px;
            word-wrap: break-word;
        }
        .user-message {
            background-color: #2b2a33;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .model-message {
            background-color: transparent;
            color: #e3e3e3;
            align-self: flex-start;
            padding-left: 4px;
        }
        .system-status {
            align-self: center;
            background-color: #2a2b2d;
            color: #9aa0a6;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #3c4043;
        }
        /* Google AI Studio Style Input Panel */
        .input-panel {
            background-color: #1e1f20;
            padding: 12px 16px;
            border-top: 1px solid #2d2f31;
        }
        .input-wrapper {
            background-color: #282a2d;
            border-radius: 28px;
            display: flex;
            align-items: center;
            padding: 6px 6px 6px 16px;
            border: 1px solid transparent;
        }
        .input-wrapper:focus-within {
            border-color: #a8c7fa;
            background-color: #1e1f20;
        }
        #user-prompt {
            flex: 1;
            background: none;
            border: none;
            color: #e3e3e3;
            font-size: 15px;
            outline: none;
            resize: none;
            max-height: 100px;
            padding: 6px 0;
        }
        #run-btn {
            background-color: #a8c7fa;
            color: #042f62;
            border: none;
            border-radius: 24px;
            padding: 10px 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #run-btn:disabled {
            background-color: #3c4043;
            color: #80868b;
        }
    </style>
</head>
<body>

    <header>
        <h1>Freebuff Studio</h1>
        <span class="model-badge">DeepSeek Flash</span>
    </header>

    <div id="chat-container">
        <div class="message model-message">Hello! How can I help you build or code today?</div>
    </div>

    <div class="input-panel">
        <div class="input-wrapper">
            <textarea id="user-prompt" placeholder="Type a prompt..." rows="1"></textarea>
            <button id="run-btn" onclick="handleChatSubmit()">Run</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
