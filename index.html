<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freebuff VS Code Mobile</title>
    <style>
        :root {
            --editor-bg: #1e1e1e;
            --sidebar-bg: #252526;
            --activity-bg: #333333;
            --tab-active: #1e1e1e;
            --tab-inactive: #2d2d2d;
            --accent-blue: #007acc;
            --text-main: #d4d4d4;
            --text-link: #4fc1ff;
            --text-string: #ce9178;
            --text-keyword: #569cd6;
            --status-bg: #007acc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            background-color: var(--editor-bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* VS Code Style Top Tabs */
        .tabs-container {
            display: flex;
            background-color: var(--sidebar-bg);
            overflow-x: auto;
            border-bottom: 1px solid #2b2b2b;
        }

        .tab {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            background-color: var(--tab-inactive);
            font-size: 0.85rem;
            cursor: pointer;
            border-right: 1px solid #252526;
            white-space: nowrap;
        }

        .tab.active {
            background-color: var(--tab-active);
            color: #fff;
            border-top: 1px solid var(--accent-blue);
        }

        .tab span {
            color: #e5c07b;
            margin-right: 6px;
            font-weight: bold;
        }

        /* Editor Output Pane */
        .editor-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .line-wrapper {
            display: flex;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 4px;
        }

        .line-number {
            width: 30px;
            color: #858585;
            text-align: right;
            margin-right: 15px;
            user-select: none;
        }

        .code-content {
            flex: 1;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Bottom Console Controls */
        .terminal-panel {
            background-color: #181818;
            border-top: 1px solid #2b2b2b;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .terminal-header {
            font-size: 0.75rem;
            color: #858585;
            text-transform: uppercase;
            font-weight: bold;
            display: flex;
            gap: 15px;
        }

        .terminal-header span.active {
            color: #fff;
            border-bottom: 1px solid #fff;
            padding-bottom: 2px;
        }

        .input-wrapper {
            display: flex;
            background-color: var(--editor-bg);
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            padding: 8px;
            align-items: center;
        }

        .terminal-prompt {
            color: var(--text-keyword);
            margin-right: 8px;
            font-weight: bold;
            user-select: none;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-string);
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
        }

        button {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }

        button:active {
            opacity: 0.8;
        }

        /* Bottom Status Bar */
        .status-bar {
            background-color: var(--status-bg);
            color: white;
            padding: 4px 10px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="tabs-container">
        <div class="tab active"><span>JS</span> freebuff_ai.js</div>
        <div class="tab"><span>{}</span> package.json</div>
    </div>

    <div class="editor-container">
        <div class="line-wrapper">
            <div class="line-number">1</div>
            <div class="code-content"><span style="color:var(--text-keyword)">const</span> response = <span style="color:var(--text-link)">document</span>.<span style="color:#dcdcaa">getElementById</span>(<span style="color:var(--text-string)">"ai-response"</span>);</div>
        </div>
        <div class="line-wrapper">
            <div class="line-number">2</div>
            <div class="code-content" id="ai-response" style="color: var(--text-string);">// Server Online. Output terminal responses will write code or explanations here...</div>
        </div>
    </div>

    <div class="terminal-panel">
        <div class="terminal-header">
            <span class="active">Terminal</span>
            <span>Output</span>
            <span>Debug Console</span>
        </div>
        <div class="input-wrapper">
            <div class="terminal-prompt">~$</div>
            <textarea id="user-prompt" rows="2" placeholder="Type prompt/code requirement..."></textarea>
            <button onclick="handleChatSubmit()">Run</button>
        </div>
    </div>

    <div class="status-bar">
        <div>🔒 main* • Render Proxy Live</div>
        <div>UTF-8 • JavaScript</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
